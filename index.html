<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة معتز لتنزيل فيديوهات YouTube</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: { brand: { 500: '#14b8a6', 600: '#0d9488' } }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { font-family: 'Tajawal', sans-serif; transition: background-color 0.3s; }
        .gradient-text { background: linear-gradient(to right, #14b8a6, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(75, 85, 99, 0.4); }
        .loader-bar { width: 0%; height: 4px; background: #14b8a6; transition: width 0.4s; }
    </style>
</head>

<body class="bg-[#0f172a] text-gray-100 min-h-screen flex flex-col items-center p-4 md:p-8">

    <header class="w-full max-w-4xl flex justify-between items-center mb-16">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-bolt text-brand-500 text-3xl"></i>
            <span class="text-2xl font-bold tracking-tight">معتز تيك</span>
        </div>
        <div class="text-sm text-gray-400">أداة مجانية 100%</div>
    </header>

    <main class="w-full max-w-3xl text-center space-y-10">
        <div class="space-y-4">
            <h1 class="text-4xl md:text-6xl font-black">أداة معتز فيديوهات <br> <span class="gradient-text">YouTube المجانية</span></h1>
            <p class="text-gray-400 text-lg">الصق رابط الفيديو أدناه للمعاينة والتحميل المباشر</p>
        </div>

        <div class="relative max-w-2xl mx-auto">
            <input id="video-url" type="url" placeholder="https://www.youtube.com/watch?v=..." 
                   class="w-full px-6 py-5 rounded-2xl bg-gray-800/50 border border-gray-700 outline-none focus:ring-2 focus:ring-brand-500 text-left transition-all" dir="ltr">
            <button id="analyze-btn" class="mt-4 w-full sm:absolute sm:mt-0 sm:left-2 sm:top-2 sm:bottom-2 sm:w-auto px-8 bg-brand-600 hover:bg-brand-500 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-magnifying-glass"></i> تحليل
            </button>
        </div>

        <div id="result-container" class="hidden animate-fade-in space-y-6">
            <div class="glass-card p-6 rounded-3xl shadow-2xl">
                <h3 class="text-lg font-bold mb-4 text-brand-500 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-eye"></i> معاينة الفيديو
                </h3>
                
                <div class="relative aspect-video rounded-xl overflow-hidden border border-gray-700 mb-6">
                    <iframe id="video-preview" class="absolute inset-0 w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
                </div>

                <div id="progress-container" class="hidden w-full bg-gray-700 rounded-full h-1 mb-6 overflow-hidden">
                    <div id="progress-bar" class="loader-bar"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="handleDownload('mp4')" class="flex items-center justify-between p-4 bg-green-600/20 hover:bg-green-600/30 border border-green-600/50 rounded-2xl transition-all group">
                        <span class="font-bold">تنزيل فيديو MP4 (720p)</span>
                        <i class="fa-solid fa-download group-hover:bounce"></i>
                    </button>
                    <button onclick="handleDownload('mp3')" class="flex items-center justify-between p-4 bg-blue-600/20 hover:bg-blue-600/30 border border-blue-600/50 rounded-2xl transition-all group">
                        <span class="font-bold">تنزيل صوت MP3</span>
                        <i class="fa-solid fa-music group-hover:bounce"></i>
                    </button>
                </div>
                <p class="mt-4 text-xs text-gray-500 italic">ملاحظة: سيتم فتح صفحة المعالجة لبدء التنزيل تلقائياً</p>
            </div>
        </div>
    </main>

    <footer class="mt-20 text-gray-600 text-sm">
        © 2026 مطور بواسطة معتز | جميع الحقوق محفوظة
    </footer>

    <script>
        const urlInput = document.getElementById('video-url');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultContainer = document.getElementById('result-container');
        const previewFrame = document.getElementById('video-preview');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');

        // وظيفة استخراج المعرف
        function getID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // معالجة الرابط
        function startAnalysis() {
            const id = getID(urlInput.value.trim());
            if (id) {
                resultContainer.classList.remove('hidden');
                previewFrame.src = `https://www.youtube.com/embed/${id}`;
                resultContainer.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("الرابط غير صحيح، يرجى التأكد من رابط يوتيوب");
            }
        }

        analyzeBtn.addEventListener('click', startAnalysis);
        urlInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') startAnalysis(); });

        // التنزيل المباشر (باستخدام محرك حقيقي لتجنب خطأ DNS)
        function handleDownload(format) {
            const url = urlInput.value.trim();
            progressContainer.classList.remove('hidden');
            progressBar.style.width = '100%';

            setTimeout(() => {
                // استخدام محرك معالجة حقيقي (مثل 9xbuddy) لضمان العمل
                let finalUrl = `https://9xbuddy.org/process?url=${encodeURIComponent(url)}`;
                if(format === 'mp3') finalUrl += "&type=audio";

                window.open(finalUrl, '_blank'); // التنزيل يبدأ في نافذة جديدة دون مغادرة موقعك
                
                setTimeout(() => {
                    progressContainer.classList.add('hidden');
                    progressBar.style.width = '0%';
                }, 2000);
            }, 800);
        }
    </script>
</body>
</html>
