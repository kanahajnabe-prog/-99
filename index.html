<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة معتز - تنزيل مباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: { brand: { 500: '#14b8a6', 600: '#0d9488' } }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: white; }
        .gradient-text { background: linear-gradient(to right, #14b8a6, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        /* أنيميشن التحميل */
        .loader-bar { width: 0%; height: 4px; background: #14b8a6; transition: width 0.5s; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-4xl w-full text-center space-y-8">
        <h1 class="text-5xl font-extrabold">أداة معتز <span class="gradient-text">للتنزيل المباشر</span></h1>

        <div class="max-w-xl mx-auto">
            <input id="video-url" type="url" placeholder="ضع رابط الفيديو هنا..." 
                   class="w-full px-5 py-4 rounded-xl border border-gray-700 bg-gray-800 outline-none text-left mb-4" dir="ltr">
            
            <div id="preview-area" class="hidden animate-fade-in space-y-4 bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
                <div class="relative aspect-video rounded-lg overflow-hidden border border-gray-600">
                    <iframe id="video-iframe" class="absolute inset-0 w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
                </div>
                
                <div id="progress-container" class="hidden w-full bg-gray-700 rounded-full h-1 overflow-hidden">
                    <div id="progress-bar" class="loader-bar"></div>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <button id="direct-download-btn" class="w-full py-4 bg-green-600 hover:bg-green-500 rounded-xl font-bold flex items-center justify-center gap-2 transition-all">
                        <i class="fa-solid fa-file-arrow-down"></i>
                        <span id="btn-text">تنزيل فيديو MP4 (720p) مباشر</span>
                    </button>
                    <p id="download-note" class="text-xs text-gray-400">سيتم بدء التنزيل في المتصفح تلقائياً</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('video-url');
        const previewArea = document.getElementById('preview-area');
        const videoIframe = document.getElementById('video-iframe');
        const downloadBtn = document.getElementById('direct-download-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const btnText = document.getElementById('btn-text');

        // استخراج الـ ID للعرض
        urlInput.addEventListener('input', () => {
            const url = urlInput.value.trim();
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            
            if (match && match[2].length === 11) {
                previewArea.classList.remove('hidden');
                videoIframe.src = `https://www.youtube.com/embed/${match[2]}`;
            }
        });

        // ميكانيكية التنزيل "الدايركت"
        downloadBtn.addEventListener('click', async () => {
            const videoUrl = urlInput.value;
            if(!videoUrl) return;

            // 1. تغيير حالة الزر
            btnText.innerText = "جاري التحضير...";
            downloadBtn.disabled = true;
            progressContainer.classList.remove('hidden');
            
            // 2. محاكاة تقدم التحميل (لأن التنزيل الفعلي يتم عبر السيرفر)
            let width = 0;
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                } else {
                    width += 10;
                    progressBar.style.width = width + '%';
                }
            }, 200);

            // 3. تقنية التنزيل بدون مغادرة الصفحة:
            // سنستخدم رابط API يقوم بإجبار المتصفح على تحميل الملف (Force Download)
            // ملاحظة: استبدل الرابط أدناه بـ API الخاص بك إذا كان لديك سيرفر Node.js/Python
            const proxyDownloadUrl = `https://api.download-service.com/fetch?url=${encodeURIComponent(videoUrl)}`;

            // إنشاء عنصر "a" مخفي وضغط عليه برمجياً لتجنب الانتقال
            const hiddenAnchor = document.createElement('a');
            hiddenAnchor.href = proxyDownloadUrl;
            hiddenAnchor.setAttribute('download', 'video.mp4'); // محاولة إجبار التنزيل
            hiddenAnchor.style.display = 'none';
            document.body.appendChild(hiddenAnchor);
            
            // ننتظر قليلاً ثم نوجه "الطلب" في الخلفية
            setTimeout(() => {
                hiddenAnchor.click(); // هذا سيفتح نافذة التنزيل الخاصة بالمتصفح دون ترك الصفحة
                document.body.removeChild(hiddenAnchor);
                
                btnText.innerText = "تم بدء التنزيل!";
                downloadBtn.classList.replace('bg-green-600', 'bg-blue-600');
                
                setTimeout(() => {
                    btnText.innerText = "تنزيل فيديو MP4 (720p) مباشر";
                    downloadBtn.disabled = false;
                    downloadBtn.classList.replace('bg-blue-600', 'bg-green-600');
                    progressContainer.classList.add('hidden');
                    progressBar.style.width = '0%';
                }, 3000);
            }, 2000);
        });
    </script>
</body>
</html>
