<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة معتز - معاينة وتحميل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                    colors: { brand: { 500: '#14b8a6', 600: '#0d9488' } }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .gradient-text {
            background: linear-gradient(to right, #14b8a6, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-4xl w-full text-center space-y-8">
        <h1 class="text-5xl font-extrabold">
            أداة معتز فيديوهات <br>
            <span class="gradient-text">YouTube المجانية</span>
        </h1>

        <div class="max-w-xl mx-auto space-y-4">
            <div class="flex flex-col sm:flex-row gap-3">
                <input id="video-url" type="url" placeholder="ضع رابط الفيديو هنا..." 
                       class="flex-1 px-5 py-4 rounded-xl border border-gray-700 bg-gray-800 focus:ring-2 focus:ring-brand-500 outline-none text-left" dir="ltr">
                <button id="process-btn" class="px-8 py-4 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-bold transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span>تحليل</span>
                </button>
            </div>
            <p class="text-xs text-gray-400">
                <i class="fa-solid fa-circle-info text-brand-500"></i> سيتم عرض الفيديو وخيارات التحميل فور إدخال الرابط.
            </p>
        </div>

        <div id="preview-section" class="hidden space-y-6 bg-gray-800 p-6 rounded-2xl border border-gray-700 animate-fade-in">
            <h3 class="text-xl font-bold text-brand-500">معاينة الفيديو</h3>
            
            <div class="relative aspect-video w-full rounded-xl overflow-hidden shadow-2xl">
                <iframe id="video-iframe" class="absolute inset-0 w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6">
                <div class="p-4 bg-gray-700 rounded-lg flex justify-between items-center">
                    <span>جودة عالية MP4 (720p)</span>
                    <button class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded text-sm font-bold"><i class="fa-solid fa-download"></i></button>
                </div>
                <div class="p-4 bg-gray-700 rounded-lg flex justify-between items-center">
                    <span>صوت فقط MP3</span>
                    <button class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-bold"><i class="fa-solid fa-music"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('video-url');
        const processBtn = document.getElementById('process-btn');
        const previewSection = document.getElementById('preview-section');
        const videoIframe = document.getElementById('video-iframe');

        // وظيفة استخراج معرف الفيديو من الرابط
        function getYoutubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function handleProcess() {
            const url = urlInput.value.trim();
            const videoID = getYoutubeID(url);

            if (videoID) {
                // عرض القسم وتحديث الإطار
                previewSection.classList.remove('hidden');
                videoIframe.src = `https://www.youtube.com/embed/${videoID}`;
                
                // التمرير التلقائي للمعاينة
                previewSection.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert('يرجى إدخال رابط يوتيوب صحيح');
                previewSection.classList.add('hidden');
                videoIframe.src = "";
            }
        }

        // التحليل عند الضغط على الزر
        processBtn.addEventListener('click', handleProcess);

        // التحليل التلقائي عند لصق الرابط
        urlInput.addEventListener('input', () => {
            if (urlInput.value.length > 20) {
                handleProcess();
            }
        });
    </script>
</body>
</html>
